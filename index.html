<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Post</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="post-card">

    <div class="profile">
        <img src="https://i.pravatar.cc/100" alt="profile">
        <div>
            <div class="name">Your Name</div>
            <div class="title">Web Developer | Open to Work</div>
        </div>
    </div>

    <div class="content">
        🚀 Excited to share my new web project!  
        Built using HTML & CSS with a clean design.  
        Looking forward to feedback from the community.
    </div>

    <div class="actions">
        <button>👍 Like</button>
        <button>💬 Comment</button>
        <button>🔗 Share</button>
    </div>

</div>

</body>
</html>
